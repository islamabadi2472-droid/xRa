name: xra
description: xRa - Video Downloader, Player & Vault App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.4
  
  # Video Downloader (yt-dlp wrapper)
  flutter_inappwebview: ^6.0.0
  dio: ^5.4.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  
  # Database / Storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  
  # Security / Lock
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # UI
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  
  # File Management
  open_file: ^3.3.2
  share_plus: ^7.2.1
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
